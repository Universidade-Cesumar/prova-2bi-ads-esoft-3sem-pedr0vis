<!DOCTYPE html>
<html lang='pt-br'>

<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Almoxarifado hospitalar</title>
    <link rel='stylesheet' href='style.css'>
</head>

<body>

    <header>

        <h1>Sistema para gerenciar o armazenamento de objetos hospitalares</h1>

    </header>

    <main>

        <form class="formulario">

            <h2>Cadastrar materiais</h2>

            <div>
                <label class="labelFormulario">Nome do objeto:</label>
                <input class="inputFormulario" type="text" id="input-nome">
            </div>

            <div>
                <label class="labelFormulario">Quantidade do objeto:</label>
                <input class="inputFormulario" type="number" id="input-quantidade">
            </div>

            <div>
                <label class="labelFormulario">Categoria:</label>
                <select class="selectFormulario" id="select-categoria">
                    <option value="1">Material de consumo</option>
                    <option value="2">Material permanente</option>
                </select>
            </div>

            <div>
                <label class="labelFormulario">Data de cadastro:</label>
                <input class="inputFormulario" type="date" id="input-data-cadastro">
            </div>

            <div>
                <label class="labelFormulario">Data de validade <span class="label-opcional">(opcional)</span>:</label>
                <input class="inputFormulario" type="date" id="input-data-validade">
            </div>

            <button class="btnCadastrar" id="btn-cadastrar">Cadastrar</button>

        </form>

        <section class="retirada">

            <h2>Retirada de materiais</h2>

            <div>
                <label class="labelFormulario">Item a retirar:</label>
                <select class="categoria" id="select-item-retirada">
                </select>
            </div>

            <div>
                <label class="labelFormulario">Quantidade a retirar:</label>
                <input type="number" id="input-retirada" min="1">
            </div>

            <div>
                <label class="labelFormulario">Responsavel pela retirada:</label>
                <input type="text" id="input-responsavel-retirada">
            </div>

            <button class="btn-baixar" id="btn-confirmar-baixa">Confirmar retirada</button>

            <p class="mensagem-retirada" id="mensagem-retirada"></p>

        </section>

        <section class="tabela">

            <div class="tabela-controles">

                <input type="text" id="input-busca" placeholder="Pesquisar material...">

                <label class="total-itens-label">
                    Total de itens cadastrados: <span id="total-itens">0</span>
                </label>

            </div>

            <table id="lista-materiais">

            </table>
        </section>

    </main>

</body>

<script type="text/javascript" src="./main.js"></script>

</html>
